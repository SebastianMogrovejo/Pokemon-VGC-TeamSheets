<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon VGC Team Sheet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pokemon VGC Team Sheet</h1>
    <p class="subtitle">Fill in your team details below</p>

    <!-- Player Info -->
    <div class="player-info">
      <div class="field-row">
        <label>Player Name:</label>
        <input type="text" id="playerName" placeholder="Your name" />
      </div>
      <div class="field-row">
        <label>Trainer Name in Game:</label>
        <input type="text" id="trainerName" placeholder="In-game name" />
      </div>
      <div class="field-row">
        <label>Battle Team Number / Name:</label>
        <input type="text" id="teamName" placeholder="Team number or name" />
      </div>
    </div>

    <!-- Pokemon Grid -->
    <div class="pokemon-grid" id="pokemonGrid">
      <!-- Generated by JS -->
    </div>

    <!-- Generate Button -->
    <div class="generate-section">
      <button id="generateBtn" onclick="generateCode()">Generar</button>
      <div id="codeOutput" class="code-output hidden">
        <p>Tu código único:</p>
        <span id="uniqueCode"></span>
        <button class="copy-btn" onclick="copyCode()">Copiar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
