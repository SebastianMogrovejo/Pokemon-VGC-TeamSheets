<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon VGC Team Sheet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pokemon VGC Team Sheet</h1>
    <p class="subtitle">Fill in your team details below</p>

    <!-- Pokemon Grid -->
    <form id="teamForm" onsubmit="handleSubmit(event)">
    <div class="pokemon-grid" id="pokemonGrid">
      <!-- Generated by JS -->
    </div>

    <!-- Generate Button -->
    <div class="generate-section">
      <button id="generateBtn" type="submit">Generate</button>
      <div id="codeOutput" class="code-output hidden">
        <div class="code-header">
          <button class="copy-btn" type="button" onclick="copyCode()">Copy team</button>
        </div>
        <textarea id="showdownText" readonly rows="14" spellcheck="false"></textarea>
      </div>
    </div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
